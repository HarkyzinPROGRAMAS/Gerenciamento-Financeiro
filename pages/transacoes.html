<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolso Fundo</title>

    <!-- Styles -->
    <link rel="stylesheet" href="/styles/styles.css">

    <!-- Fonte -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
        rel="stylesheet">

    <!-- Icones -->
    <link rel='stylesheet'
        href='https://cdn-uicons.flaticon.com/4.0.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
</head>

<body>
    <header class="header">
        <h1>Bolso Fundo</h1>

        <div class="header-catego-container">
            <ul>
                <li>
                    <a href="/index.html" class="catego-icon-container">
                        <i class="fi fi-rr-home"></i>
                        Visão Geral
                    </a>
                </li>
            </ul>

            <ul>
                <li>
                    <a href="/pages/transacoes.html" class="catego-icon-container">
                        <i class="fi fi-rr-dollar"></i>
                        Transações
                    </a>
                </li>
            </ul>

            <ul>
                <li>
                    <a href="/pages/relatorio.html" class="catego-icon-container">
                        <i class="fi fi-rr-document"></i>
                        Relatório
                    </a>
                </li>
            </ul>

            <ul>
                <li>
                    <a href="/pages/orcamento.html" class="catego-icon-container">
                        <i class="fi fi-rr-file-invoice-dollar"></i>
                        Orçamento
                    </a>
                </li>
            </ul>
        </div>
    </header>

    <section class="visao-geral">
        <div class="dashboard-container">
            <h1>Transações</h1>

            <ul class="lista-transacoes-container" id="lista-transacoes">
                <h2>Últimas Transações</h2>
            </ul>

            <div class="transacao-add-container">

                <div class="transacao-opcao-container">
                    <div class="transacao-catego-container">
                        <label for="tipo">Tipo:</label>
                        <select name="tipo" id="tipo-transacao">
                            <option value="receita">Receita</option>
                            <option value="despesa">Despesa</option>
                        </select>
                    </div>

                    <div class="transacao-catego-container">
                        <label for="valor">Valor:</label>
                        <input type="number" name="valor" id="valor-transacao" min="0" placeholder="Valor (R$)">
                    </div>

                    <div class="transacao-catego-container">
                        <label for="data">Data:</label>
                        <input type="date" name="data" id="data-transacao">
                    </div>

                    <div class="transacao-catego-container">
                        <label for="categoria">Categoria:</label>
                        <select name="categoria" id="categoria-transacao">
                            <option value="alimentacao">Alimentação</option>
                            <option value="transporte">Transporte</option>
                            <option value="moradia">Moradia</option>
                            <option value="saude">Saúde</option>
                            <option value="lazer">Lazer</option>
                            <option value="educacao">Educação</option>
                        </select>
                    </div>
                </div>
                <button type="button" id="btn-adicionar">Adicionar</button>
            </div>

            <div class="transacao-add-catego-container">
                <div class="transacao-add-catego">
                    <input type="text" name="categoria-add" id="transacao-catego-add" placeholder="Categoria">
                    <button type="button">Adicionar Categoria</button>
                    <button type="button">Remover Categoria</button>
                </div>
            </div>

        </div>
    </section>

    <script src="/script/transacoes.js"></script>
</body>

</html>
