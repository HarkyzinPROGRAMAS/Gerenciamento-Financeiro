<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolso Fundo</title>

    <!-- Styles -->
    <link rel="stylesheet" href="/styles/styles.css">

    <!-- Fonte -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
        rel="stylesheet">

    <!-- Icones -->
    <link rel='stylesheet'
        href='https://cdn-uicons.flaticon.com/4.0.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
</head>

<body>
    <header class="header">
        <h1>Bolso Fundo</h1>

        <div class="header-catego-container">
            <ul>
                <li>
                    <a href="/index.html" class="catego-icon-container">
                        <i class="fi fi-rr-home"></i>
                        Visão Geral
                    </a>
                </li>
            </ul>

            <ul>
                <li>
                    <a href="/pages/transacoes.html" class="catego-icon-container">
                        <i class="fi fi-rr-dollar"></i>
                        Transações
                    </a>
                </li>
            </ul>

            <ul>
                <li>
                    <a href="/pages/relatorio.html" class="catego-icon-container">
                        <i class="fi fi-rr-document"></i>
                        Relatório
                    </a>
                </li>
            </ul>

            <ul>
                <li>
                    <a href="/pages/orcamento.html" class="catego-icon-container">
                        <i class="fi fi-rr-file-invoice-dollar"></i>
                        Orçamento
                    </a>
                </li>
            </ul>
        </div>
    </header>

    <section class="visao-geral">
        <div class="dashboard-container">
            <h1>Visão Geral</h1>

            <div class="visao-geral-container">

                <div class="saldo-despesas-container">
                    <div class="dinheiro-container">
                        Despesas:
                        <h2 id="total-despesas">R$0.00</h2>
                    </div>

                    <div class="linha-vertical"></div>

                    <div class="dinheiro-container">
                        Saldo Atual:
                        <h2 id="saldo-atual">R$0.00</h2>
                    </div>

                    <div class="linha-vertical"></div>

                    <div class="dinheiro-container">
                        Receitas:
                        <h2 id="total-receitas">R$0.00</h2>
                    </div>
                </div>

            </div>

            <div class="graficos-container">

                <div class="grafico">
                    <h2>Despesas do Mês atual</h2>
                    <canvas id="grafico-despesas"></canvas>
                </div>

                <div class="grafico">
                    <div id="chart-container">
                        <h2>Receitas X Despesas</h2>
                        <canvas id="grafico-comparativo"></canvas>
                        Últimos 6 meses
                    </div>
                </div>

            </div>

            <div class="transacoes-recentes-container">

                <h2>Transações Recentes</h2>
                <br>

                <ul class="lista-transacoes" id="lista-recentes"></ul>

            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/script/visaoGeral.js"></script>
</body>

</html>
