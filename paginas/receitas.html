<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../src/styles.css">
    <title>Gerenciamento Financeiro</title>
</head>
<body>
    <section class = "titulo">
        <header>
            <h1>Receitas</h1>
        </header>
    </section>

    <section class="voltar">
        <div class="botaoVoltar">
            <a href="../src/index.html">Voltar</a>
        </div>
    </section>

    <section class="containerReceita">
    <h3>Adicionar Receita:</h3>

    <form id="formularioReceita">
      <input 
        type="text" 
        placeholder="Descrição"
        required
      >

      <input 
        type="number" 
        placeholder="Valor"
        step="0.01"
        required
      >

      <input 
        type="date"
        required
      >
        
      <button type="submit">Adicionar</button>
    </form>

    
  </section>

  <section class="listaContainer">
    <h3>Receitas:</h3>

    <ul class="listaReceita" id="listaReceitas">
      
    </ul>
  </section>

  <script src="/src/receitas.js"></script>
</body>
</html>
