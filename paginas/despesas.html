    <h3>Adicionar Despesas:</h3>

    <form id="formularioDespesas">
      <input 
        type="text" 
        placeholder="Descrição"
        required
      >

      <input 
        type="number" 
        placeholder="Valor"

        required
      >

      <input 
        type="date"
        required
      >

    </form>
